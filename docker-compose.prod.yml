version: "3.9"

# Production overrides:
# - Reads secrets from Docker secrets / external secret store
# - Increases worker count, locks down ports
# - Frontend behind nginx

services:
  api:
    image: ${REGISTRY}/mailguard-api:${TAG:-latest}
    restart: always
    environment:
      APP_ENV: production
    secrets:
      - jwt_secret
      - aes_secret
      - openai_key
    deploy:
      replicas: 3
      resources:
        limits: { cpus: "2", memory: 2G }
    networks: [mailguard]

  worker:
    image: ${REGISTRY}/mailguard-api:${TAG:-latest}
    restart: always
    command: ["celery", "-A", "app.workers.celery_app", "worker", "-l", "INFO", "--concurrency=8"]
    secrets:
      - jwt_secret
      - aes_secret
      - openai_key
    deploy:
      replicas: 4
    networks: [mailguard]

  beat:
    image: ${REGISTRY}/mailguard-api:${TAG:-latest}
    restart: always
    command: ["celery", "-A", "app.workers.celery_app", "beat", "-l", "INFO"]
    secrets:
      - jwt_secret
      - aes_secret
    networks: [mailguard]

  frontend:
    image: ${REGISTRY}/mailguard-frontend:${TAG:-latest}
    restart: always
    networks: [mailguard]

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend
    networks: [mailguard]

secrets:
  jwt_secret:
    external: true
  aes_secret:
    external: true
  openai_key:
    external: true

networks:
  mailguard:
    driver: overlay
