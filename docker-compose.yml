version: "3.9"

x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-development}
  DATABASE_URL: postgresql+asyncpg://mailguard:mailguard@postgres:5432/mailguard
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  JWT_SECRET: ${JWT_SECRET:-dev-secret}
  AES_SECRET: ${AES_SECRET:-dGVzdC1zZWNyZXQtMzItYnl0ZS1zZWNyZXQ=}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
  OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
  OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-tts-1}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/v1/accounts/gmail/callback}
  GMAIL_PUBSUB_TOPIC: ${GMAIL_PUBSUB_TOPIC:-}
  MS_CLIENT_ID: ${MS_CLIENT_ID:-}
  MS_CLIENT_SECRET: ${MS_CLIENT_SECRET:-}
  MS_TENANT: ${MS_TENANT:-common}
  MS_REDIRECT_URI: ${MS_REDIRECT_URI:-http://localhost:8000/api/v1/accounts/outlook/callback}
  WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-meta}
  WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
  WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID:-}
  TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
  TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
  TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
  CHROMA_PERSIST_DIR: /data/chroma

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mailguard
      POSTGRES_PASSWORD: mailguard
      POSTGRES_DB: mailguard
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - chroma:/data
      - voice_cache:/app/voice_cache
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - chroma:/data
      - voice_cache:/app/voice_cache
    command: ["celery", "-A", "app.workers.celery_app", "worker", "-l", "INFO", "-Q", "mailguard.email,mailguard.voice,mailguard.whatsapp,mailguard.briefings,mailguard.default"]

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.workers.celery_app", "beat", "-l", "INFO"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:8000
      NEXT_PUBLIC_WS_URL: ws://api:8000/ws
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
  redisdata:
  chroma:
  voice_cache:
