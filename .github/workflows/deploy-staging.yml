name: Deploy - Staging

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Apply manifests (preview namespace)
        run: |
          kubectl --context staging -n mailguard-pr-${{ github.event.number }} apply -f infrastructure/k8s/
      - name: Run smoke tests
        run: |
          kubectl --context staging -n mailguard-pr-${{ github.event.number }} wait --for=condition=ready pod -l app=mailguard-api --timeout=180s
