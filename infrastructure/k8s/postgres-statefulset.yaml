apiVersion: v1
kind: Service
metadata:
  name: mailguard-postgres
  namespace: mailguard
spec:
  clusterIP: None
  selector:
    app: mailguard-postgres
  ports:
    - port: 5432
      name: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mailguard-postgres
  namespace: mailguard
spec:
  serviceName: mailguard-postgres
  replicas: 1
  selector:
    matchLabels:
      app: mailguard-postgres
  template:
    metadata:
      labels:
        app: mailguard-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: mailguard
            - name: POSTGRES_USER
              value: mailguard
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mailguard-secrets
                  key: DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "mailguard"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "500m", memory: 1Gi }
            limits: { cpu: "2", memory: 4Gi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mailguard-postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mailguard-postgres-pvc
  namespace: mailguard
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 100Gi
