apiVersion: v1
kind: Service
metadata:
  name: mailguard-redis
  namespace: mailguard
spec:
  selector:
    app: mailguard-redis
  ports:
    - port: 6379
      name: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailguard-redis
  namespace: mailguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailguard-redis
  template:
    metadata:
      labels:
        app: mailguard-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          resources:
            requests: { cpu: "100m", memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mailguard-redis-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mailguard-redis-pvc
  namespace: mailguard
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
