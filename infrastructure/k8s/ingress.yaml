apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mailguard-ingress
  namespace: mailguard
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.mailguard.ai
      secretName: mailguard-tls
  rules:
    - host: app.mailguard.ai
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mailguard-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mailguard-frontend
                port:
                  number: 3000
