apiVersion: v1
kind: Service
metadata:
  name: mailguard-frontend
  namespace: mailguard
spec:
  selector:
    app: mailguard-frontend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailguard-frontend
  namespace: mailguard
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mailguard-frontend
  template:
    metadata:
      labels:
        app: mailguard-frontend
    spec:
      containers:
        - name: frontend
          image: mailguard/frontend:latest
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: https://app.mailguard.ai
            - name: NEXT_PUBLIC_WS_URL
              value: wss://app.mailguard.ai/ws
          ports:
            - containerPort: 3000
          resources:
            requests: { cpu: "100m", memory: 256Mi }
            limits: { cpu: "500m", memory: 512Mi }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mailguard-frontend-hpa
  namespace: mailguard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mailguard-frontend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
